<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hong Kong School of AI | 探索人工智能的未來</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #333333;
            --gray-text: #888888;
            --margin: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* 佈局容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--margin);
        }

        /* Header / Logo */
        header {
            padding: 60px 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo-rect {
            width: 200px; /* 20:7 ratio placeholder */
            height: 70px;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--gray-text);
        }

        /* Hero Section */
        .hero {
            padding: 100px 0;
            border-top: 1px solid var(--accent-color);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .hero-flex {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .description {
            font-size: 20px;
            font-weight: 300;
            max-width: 400px;
            color: var(--gray-text);
        }

        /* Luma Section */
        .luma-section {
            padding: 100px 0;
            border-top: 1px solid var(--accent-color);
        }

        .section-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 60px;
            color: var(--gray-text);
        }

        /* 這裡模擬 Luma Embed */
        .luma-placeholder {
            width: 100%;
            min-height: 400px;
            border: 1px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
        }

        .luma-placeholder:hover {
            background: #050505;
        }

        .btn-luma {
            display: inline-block;
            padding: 15px 30px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-luma:hover {
            background: #fff;
            color: #000;
        }

        /* Footer */
        footer {
            padding: 100px 0 60px 0;
            border-top: 1px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .social-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-right: 20px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .logo-sq {
            width: 80px;
            height: 80px;
            background: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        @media (max-width: 768px) {
            .hero-flex { grid-template-columns: 1fr; }
            h1 { font-size: 4rem; }
            footer { flex-direction: column; align-items: flex-start; gap: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-rect">LOGO 20:7</div>
            <nav class="social-links">
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h1>HONG KONG<br>SCHOOL OF AI</h1>
                <div class="hero-flex">
                    <p class="description">
                        致力於推動香港 AI 技術的普及與創新。我們透過工作坊、技術分享與社群活動，連接開發者與創意人。
                    </p>
                    <div style="text-align: right;">
                        </div>
                </div>
            </section>

            <section class="luma-section">
                <p class="section-label">Upcoming Events</p>
                
                <div class="luma-placeholder">
                    <p style="color: var(--gray-text);">Join our community events on Luma</p>
                    <a href="https://lu.ma/your-handle" class="btn-luma" target="_blank">瀏覽活動日曆</a>
                </div>
            </section>
        </main>

        <footer>
            <div>
                <p style="font-size: 12px; color: var(--gray-text);">© 2026 HKSAI. Built for the Intelligence Age.</p>
            </div>
            <div class="logo-sq">LOGO 1:1</div>
        </footer>
    </div>

    <script>
        // 簡單的進入動畫
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, .description, .luma-section');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = `all 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${index * 0.2}s`;
                
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100);
            });
        });
    </script>
</body>
</html>
